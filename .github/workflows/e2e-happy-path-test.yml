# this super workflow is used to test the e2e happy path of the signpath/github-action-submit-signing-request action
name: e2e happy path tests

on:
    workflow_dispatch:
      inputs:
        environment:
          required: true
          type: string
        workflow-dispatch-event-id:
          required: true
          type: string
        connector-url:
          required: false
          type: string
          default: ''
          description: 'SignPath connector URL (defaults to environment variable)'
        comment:
          required: false
          type: string
          default: '<no comment>'
jobs:
  call-base-workflows:
    uses: ./.github/workflows/e2e-workflow-base.yml
    secrets:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_TOKEN_ENCRYPTION_KEY: ${{ secrets.SIGNPATH_TOKEN_ENCRYPTION_KEY }}
    with:
      workflow-dispatch-event-id: ${{ inputs.workflow-dispatch-event-id }}
      environment: ${{ inputs.environment }}
      comment: ${{ inputs.comment }}
  build-and-sign:
    uses: ./.github/workflows/build-and-sign-reusable.yml
    secrets:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
    with:
      environment: ${{ inputs.environment }}
      connector-url: ${{ inputs.connector-url || vars.CONNECTOR_URL }}
      artifact-path: ./artifacts/small.exe
      signing-policy-slug: e2e-test-sp
      output-artifact-directory: C:/signpath-output/signed-artifact
      upload-signed-artifact: true
      parameters: |
        param1: ${{ toJSON('value1') }}
        param2: "value2"
